# WormTracker 默认配置文件
# 修改此文件后重新启动软件即可生效
# 也可在 GUI 的「参数调节」面板中实时调整并导出

# ---- 后端选择 ----
# mog2: 传统视觉 (不需要 GPU，适合任何电脑)
backend: mog2

# ---- 物理映射 ----
num_channels: 32          # 微流控芯片通道数
x_margin_left: 0.05       # 画面左侧裁剪比例
x_margin_right: 0.15      # 画面右侧裁剪比例
wall_ratio: 0.0            # 通道壁宽度比例

# ---- 检测判定 ----
tripwire_ratio: 0.65       # 计数检测线高度 (0=顶部, 1=底部)
min_area: 15               # 虫体最小像素面积
max_area: 4500             # 虫体最大像素面积
mask_top_ratio: 0.35       # 屏蔽区域上界 (仅 MOG2)
mask_bottom_ratio: 0.85    # 屏蔽区域下界 (仅 MOG2)

# ---- MOG2 背景建模 ----
bg_history: 500            # 背景学习历史帧数
var_threshold: 16           # 背景模型敏感度 (越小越敏感)
init_frame_index: 60       # 预热帧数

# ---- 追踪策略 ----
max_dist_x: 25             # 最大水平位移 (防串道)
max_dist_y: 300            # 最大垂直位移 (容忍高速)
track_history_len: 100     # 轨迹历史最大长度
cross_debounce: 20         # 越线冷却帧数

# ---- 熔断保护 (仅 MOG2) ----
panic_noise_ratio: 0.015   # 触发熔断的噪点比例阈值
grid_mutation_tolerance: 0.15  # 网格突变容忍度
cooldown_frames: 30        # 熔断冷却帧数

# ---- 输出 ----
export_format: xlsx          # 导出格式: xlsx | csv
