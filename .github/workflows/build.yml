name: Build WormTracker

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Windows: 生成 .exe 单文件 ────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python numpy pandas openpyxl pyyaml
          pip install PyQt6 matplotlib
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --clean wormtracker.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WormTracker-Windows
          path: dist/WormTracker.exe
          if-no-files-found: error

  # ── macOS: 生成 .app 应用包 ──────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python numpy pandas openpyxl pyyaml
          pip install PyQt6 matplotlib
          pip install pyinstaller

      - name: Build APP
        run: pyinstaller --clean wormtracker.spec

      - name: Package as DMG (optional)
        run: |
          if [ -d "dist/WormTracker.app" ]; then
            cd dist
            zip -r WormTracker-macOS.zip WormTracker.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WormTracker-macOS
          path: dist/WormTracker-macOS.zip
          if-no-files-found: error

  # ── 发布 Release (仅 tag 触发) ──────────────────────
  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WormTracker-Windows/WormTracker.exe
            WormTracker-macOS/WormTracker-macOS.zip
          draft: false
          generate_release_notes: true
